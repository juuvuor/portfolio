<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Portfolio – work in process" />
    <title>Work in Process</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f9f9f9;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        color: #111;
      }

      .card {
        text-align: center;
        padding: 3rem 2.5rem;
        max-width: 420px;
        width: 90%;
      }

      h1 {
        font-size: 1.75rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        margin-bottom: 1rem;
      }

      p {
        font-size: 1rem;
        color: #555;
        line-height: 1.6;
        margin-bottom: 1.75rem;
      }

      .links {
        display: flex;
        gap: 1rem;
        justify-content: center;
        flex-wrap: wrap;
      }

      .links a {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.55rem 1.25rem;
        border: 1.5px solid #111;
        border-radius: 6px;
        font-size: 0.9rem;
        font-weight: 600;
        color: #111;
        text-decoration: none;
        transition: background 0.15s, color 0.15s;
      }

      .links a:hover {
        background: #111;
        color: #f9f9f9;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Work in Process</h1>
      <p>You can see my recent works on LinkedIn or GitHub.</p>
      <div class="links">
        <a href="https://www.linkedin.com/in/juusovuorela" target="_blank" rel="noopener noreferrer">
          LinkedIn
        </a>
        <a href="https://github.com/juuvuor" target="_blank" rel="noopener noreferrer">
          GitHub
        </a>
      </div>
    </div>
  </body>
</html>
